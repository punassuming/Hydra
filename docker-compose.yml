services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    # mongo:6 requires AVX; use 5.x for broader CPU support
    image: mongo:6.0
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all", "--setParameter", "diagnosticDataCollectionEnabled=false"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${SCHEDULER_REDIS_PASSWORD:-}
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=hydra_jobs
      - SCHEDULER_HEARTBEAT_TTL=10
      # Thread the API_TOKEN through as the seed token so the bundled worker
      # can connect on first boot without any extra provisioning steps.
      - SEED_DOMAIN_TOKEN=${API_TOKEN:-}
      - SEED_DOMAIN_REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      scheduler:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  mongo-data:
